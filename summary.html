<!DOCTYPE html>
<html>
<head>
  <title>Order Summary</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f4f4;
    }

    .container {
      width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Order Summary</h2>

  <p>Customer Name: <span id="name"></span></p>
  <p>Product: <span id="product"></span></p>
  <p>Quantity: <span id="quantity"></span></p>
  <p>Total Amount: <span id="total"></span></p>
  <p>Pickup Method: <span id="pickup"></span></p>
  <p>Address: <span id="address"></span></p>

  <br>
  <b>Thank you for your order!</b>
</div>

<script>

function getCookie(name){

let cookies = document.cookie.split(";");

for(let i=0;i<cookies.length;i++){
let c = cookies[i].trim();

if(c.indexOf(name + "=") == 0){
return decodeURIComponent(c.substring(name.length + 1));
}
}
return "";
}

let name = getCookie("customerName");

let productData = localStorage.getItem("product");
let quantity = localStorage.getItem("quantity");
let pickup = localStorage.getItem("pickup");
let address = localStorage.getItem("address");

let split = productData.split("|");
let product = split[0];
let price = split[1];

let total = price * quantity;

document.getElementById("name").innerText = name;
document.getElementById("product").innerText = product;
document.getElementById("quantity").innerText = quantity;
document.getElementById("total").innerText = "PHP " + total;
document.getElementById("pickup").innerText = pickup;
document.getElementById("address").innerText = address;

</script>

</body>
</html>
